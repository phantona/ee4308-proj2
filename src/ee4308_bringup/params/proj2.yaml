drone:
  behavior:
    ros__parameters:
      reached_thres: 0.3
      cruise_height: 5.0
      frequency: 10.0
      use_sim_time: true
      # initial_x: -2.0 # overwritten by launch file
      # initial_y: -2.0 # overwritten by launch file
      # initial_z: 0.05 # overwritten by launch file

  controller: #there is another "controller" node that is generated by Gazebo.
    ros__parameters:
      lookahead_distance: 1.0
      max_xy_vel: 1.0
      max_z_vel: 1.0
      yaw_vel: 0.0
      kp_xy: 1.0
      kp_z: 1.0
      frequency: 20.0
      enable: true
      use_sim_time: true 

  planner:
    ros__parameters:
      interpolation_distance: 0.1
      
  estimator:
    ros__parameters:
      frequency: 30.0
      var_imu_x: 1.0
      var_imu_y: 1.0
      var_imu_z: 1.0
      var_imu_a: 1.0
      var_gps_x: 1.0
      var_gps_y: 1.0
      var_gps_z: 1.0
      var_baro: 1.0
      var_sonar: 1.0
      var_magnet: 1.0
      use_sim_time: true
      use_ground_truth: false
      verbose: true
      # initial_x: -2.0 # overwritten by launch file
      # initial_y: -2.0 # overwritten by launch file
      # initial_z: 0.05 # overwritten by launch file


######################################################
# TO STUDENTS: no changing below.
turtle:
  behavior:
    ros__parameters:
      waypoints: [1.0, 4.0, -4.5, -2.0] # {list of double}
      frequency: 1.0                    # {double}
      reached_thres: 0.05               # {double}
      use_sim_time: true 

  planner:
    ros__parameters:
      max_access_cost: 90
      use_sim_time: true

  controller:
    ros__parameters:
      frequency: 10.0           # {double}
      kp_lin: 0.8               # {double}
      kp_ang: 1.0               # {double}
      max_lin_vel: 0.22         # {double}
      max_ang_vel: 1.0          # {double}
      xy_tolerance: 0.05        # {double}
      yaw_tolerance: 0.78       # {double}
      lookahead_distance: 0.3   # {double}
      enable: true              # {bool}
      use_sim_time: true

  map_loader: # not needed for the turtle to work. For visualization only.
    ros__parameters:
      frame_id: "/map"          # {string}
      max_cost: 99              # {int} DO NOT CHANGE
      min_cost: 0               # {int} DO NOT CHANGE
      topic_map: "map"          # {string}
      topic_global_costmap: "global_costmap"    #{string}
      circumscribed_radius: 0.2 # {double} [m]
      inflation_radius: 0.8     # {double} [m]
      cost_exponent: 8.0        # {double}
      # filepath: "src/ee4308_bringup/maps/turtlebot3_house.world" # {string} this will be overridden by the launch file.